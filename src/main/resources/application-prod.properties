# Profil production (PostgreSQL). Active via SPRING_PROFILES_ACTIVE=prod.
# Toutes les valeurs sont surchargeables par variables d'environnement
# (ex. sur Coolify : definir DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET).

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bank}
spring.datasource.username=${DB_USERNAME:bank}
spring.datasource.password=${DB_PASSWORD:bank}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-me-in-production-please-0123456789abcdef}
app.jwt.ttl-seconds=${JWT_TTL_SECONDS:3600}

# Seed de demonstration : actif par defaut en prod, idempotent.
app.seed.enabled=${SEED_ENABLED:true}
