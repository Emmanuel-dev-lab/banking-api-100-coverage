# Configuration par defaut = PostgreSQL pilote par variables d'environnement.
# Ne depend d'aucun profil Spring (robuste sur Coolify/Docker, qui n'activent
# pas toujours un profil). Les TESTS utilisent H2 via src/test/resources.

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bank}
spring.datasource.username=${DB_USERNAME:bank}
spring.datasource.password=${DB_PASSWORD:bank}
spring.datasource.driver-class-name=org.postgresql.Driver

# 'update' cree/maj le schema au demarrage (tables creees si absentes).
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false

# Secret JWT : AUCUN defaut. L'application refuse de demarrer si JWT_SECRET
# est absent ou fait moins de 32 octets (256 bits requis par HS256).
app.jwt.secret=${JWT_SECRET}
app.jwt.ttl-seconds=${JWT_TTL_SECONDS:3600}
app.jwt.issuer=${JWT_ISSUER:banking-api}

# Seed de demonstration (idempotent). Active via SEED_ENABLED=true (Docker).
app.seed.enabled=${SEED_ENABLED:false}
