# Configuration de TEST : H2 en memoire, schema recree, seed desactive.
# Surcharge la config principale (PostgreSQL) pour des tests rapides et offline.

spring.datasource.url=jdbc:h2:mem:bank;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=test-secret-key-0123456789-abcdefghijklmnopqrstuvwxyz
app.jwt.ttl-seconds=3600
app.jwt.issuer=banking-api-test
app.seed.enabled=false
