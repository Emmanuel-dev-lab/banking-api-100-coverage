services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bank}
      POSTGRES_USER: ${POSTGRES_USER:-bank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bank}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bank} -d ${POSTGRES_DB:-bank}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-bank}
      DB_USERNAME: ${POSTGRES_USER:-bank}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bank}
      # Obligatoire, aucun defaut : compose echoue si JWT_SECRET n'est pas defini
      # (>= 32 octets requis). Definir dans .env ou l'UI Coolify.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET doit etre defini (>= 32 octets)}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-3600}
      JWT_ISSUER: ${JWT_ISSUER:-banking-api}
      SEED_ENABLED: ${SEED_ENABLED:-true}
    # Pas de binding de port hote : sur Coolify, le reverse-proxy route vers
    # ce port expose via le reseau interne. Pour exposer un port en local,
    # voir docker-compose.override.yml (applique automatiquement par
    # `docker compose up`, ignore par Coolify qui passe -f docker-compose.yml).
    expose:
      - "8080"

volumes:
  db_data:
