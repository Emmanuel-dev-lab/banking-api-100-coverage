# Sert le SPA et relaie /api vers le backend (meme origine -> aucun CORS).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des assets texte.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy vers l'API interne. Le prefixe /api est conserve
    # (les routes backend sont sous /api/**).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Transmet l'en-tete Authorization (Bearer JWT) tel quel.
        proxy_pass_request_headers on;
    }

    # Assets immuables (hashes Vite) : cache long.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA : toute autre route renvoie index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
